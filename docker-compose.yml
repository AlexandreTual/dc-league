services:
  dc-app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NODE_ENV: production
    volumes:
      - dc-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/players"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dc-data:
